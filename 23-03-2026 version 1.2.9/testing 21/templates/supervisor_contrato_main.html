<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisor de Contratos - Requisiciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0070a8;
            --primary-blue-dark: #004d75;
            --primary-blue-light: #e0f2fe;
            --primary-orange: #f39200;
            --primary-orange-dark: #d58000;
            --primary-orange-light: #ffedd5;
            --bg-light: #f8fafc;
            --text-dark: #334155;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --border-soft: #e2e8f0;
            --shadow-soft: 0 10px 26px rgba(15, 23, 42, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-light);
            background-image:
                radial-gradient(circle at 0% 0%, rgba(14, 165, 233, 0.12), transparent 28%),
                radial-gradient(circle at 100% 0%, rgba(243, 146, 0, 0.1), transparent 24%),
                linear-gradient(180deg, #f8fbff 0%, #f8fafc 55%, #f1f5f9 100%);
            font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 260px;
            background: var(--card-bg);
            border-right: 1px solid var(--border-soft);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            box-shadow: 0 10px 26px rgba(15, 23, 42, 0.08);
            z-index: 100;
        }

        .sidebar-header {
            padding: 14px 16px;
            background: linear-gradient(90deg, var(--primary-blue-dark) 0%, var(--primary-blue) 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.22);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-logo {
            font-size: 14px;
            font-weight: 800;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex: 0;
        }

        .sidebar-logo img {
            height: 32px;
            width: auto;
            filter: brightness(0) invert(1);
        }

        .sidebar-subtitle {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .sidebar-search {
            padding: 12px;
            border-bottom: 1px solid #f3f4f6;
        }

        .sidebar-search input {
            width: 100%;
            padding: 8px 12px;
            border: 1.5px solid var(--border-soft);
            border-radius: 8px;
            font-size: 12px;
            background: var(--bg-light);
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .sidebar-search input:focus {
            outline: none;
            background: var(--card-bg);
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 3px var(--primary-orange-light);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        .req-item {
            padding: 10px 12px;
            margin: 3px 8px;
            border-left: 3px solid transparent;
            cursor: pointer;
            transition: all 0.25s ease;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        .req-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--primary-blue-dark) 0%, var(--primary-blue) 100%);
            transform: scaleY(0);
            transform-origin: center;
            transition: transform 0.25s ease;
        }

        .req-item:hover {
            background: var(--bg-light);
        }

        .req-item.active {
            background: var(--primary-blue-light);
            box-shadow: inset 0 0 0 1px rgba(0, 112, 168, 0.2);
            font-weight: 600;
        }

        .req-item.active::before {
            transform: scaleY(1);
        }

        .req-item-number {
            display: block;
            font-weight: 700;
            font-size: 12px;
            color: var(--text-dark);
            margin-bottom: 2px;
        }

        .req-item-date {
            display: block;
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 3px;
        }

        .req-item-status {
            display: inline-block;
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 5px;
            background: var(--bg-light);
            color: var(--text-dark);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .req-item-status.approved {
            background: #d1fae5;
            color: #065f46;
        }

        .req-item-status.pending {
            background: var(--primary-orange-light);
            color: var(--primary-orange-dark);
        }

        .req-item-status.rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid var(--border-soft);
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-light);
        }

        .sidebar-footer-user {
            flex: 1;
        }

        .sidebar-footer-name {
            font-weight: 700;
            color: var(--text-dark);
            display: block;
            font-size: 11px;
        }

        .sidebar-footer-role {
            color: var(--text-muted);
            font-size: 9px;
            margin-top: 1px;
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            font-size: 16px;
            transition: all 0.2s ease;
            border-radius: 6px;
        }

        .logout-btn:hover {
            background: var(--primary-orange-light);
            color: var(--primary-orange-dark);
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            margin-left: 260px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .topbar {
            padding: 14px 24px;
            background: linear-gradient(90deg, var(--primary-blue-dark) 0%, var(--primary-blue) 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.22);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 20px rgba(2, 54, 97, 0.25);
        }

        .topbar-title {
            font-size: 16px;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .topbar-actions {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            background: linear-gradient(135deg, var(--primary-orange) 0%, var(--primary-orange-dark) 100%);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            color: #fff;
            font-size: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 12px rgba(243, 146, 0, 0.2);
        }

        .btn-icon:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(243, 146, 0, 0.35);
        }

        .btn-icon:active {
            transform: translateY(0);
        }

        .detail-panel {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background-color: var(--bg-light);
            background-image:
                radial-gradient(circle at 0% 0%, rgba(14, 165, 233, 0.12), transparent 28%),
                radial-gradient(circle at 100% 0%, rgba(243, 146, 0, 0.1), transparent 24%),
                linear-gradient(180deg, #f8fbff 0%, #f8fafc 55%, #f1f5f9 100%);
        }

        .detail-empty {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280;
            text-align: center;
        }

        .detail-empty-icon {
            font-size: 52px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .detail-empty-text {
            font-size: 15px;
            margin-bottom: 8px;
            color: #4b5563;
            font-weight: 600;
        }

        .detail-empty-subtext {
            font-size: 12px;
            color: #9ca3af;
        }

        /* ========== DETAIL SECTION ========== */
        .detail-header {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 18px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: var(--shadow-soft);
        }

        .detail-header-title {
            font-size: 17px;
            font-weight: 800;
            color: var(--primary-blue);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .detail-field {
            display: flex;
            flex-direction: column;
            padding: 12px;
            background: var(--bg-light);
            border-radius: 10px;
            border: 1px solid var(--border-soft);
        }

        .detail-field-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .detail-field-value {
            font-size: 13px;
            color: var(--text-dark);
            font-weight: 700;
        }

        .detail-field-value.status {
            padding: 6px 12px;
            border-radius: 6px;
            background: var(--bg-light);
            display: inline-block;
            width: fit-content;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .detail-field-value.status.approved {
            background: #d1fae5;
            color: #065f46;
        }

        .detail-field-value.status.pending {
            background: var(--primary-orange-light);
            color: var(--primary-orange-dark);
        }

        .detail-field-value.status.rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        /* ========== ORDENES SECTION ========== */
        .ordenes-section {
            background: var(--card-bg);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            overflow: hidden;
            box-shadow: var(--shadow-soft);
        }

        .ordenes-header {
            padding: 14px 18px;
            border-bottom: 2px solid var(--border-soft);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
        }

        .ordenes-header-title {
            font-size: 13px;
            font-weight: 800;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ordenes-header-count {
            background: linear-gradient(135deg, var(--primary-orange) 0%, var(--primary-orange-dark) 100%);
            color: #fff;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 12px rgba(243, 146, 0, 0.2);
        }

        .orden-item {
            padding: 13px 18px;
            border-bottom: 1px solid var(--border-soft);
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
        }

        .orden-item::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: -1px;
            height: 1px;
            background: linear-gradient(90deg, var(--primary-blue-dark) 0%, var(--primary-blue) 100%);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.25s ease;
        }

        .orden-item:last-child {
            border-bottom: none;
        }

        .orden-item:hover {
            background: var(--bg-light);
        }

        .orden-item:hover::after {
            transform: scaleX(1);
        }

        .orden-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .orden-item-number {
            font-weight: 800;
            color: var(--primary-blue);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .orden-item-badge {
            background: var(--bg-light);
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 10px;
            color: var(--text-dark);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        .orden-item-badge.in-bodega {
            background: #d1fae5;
            color: #065f46;
        }

        .orden-item-details {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 12px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .orden-item-detail {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .orden-item-detail-label {
            font-size: 9px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 800;
            letter-spacing: 0.3px;
        }

        .orden-item-detail-value {
            color: var(--text-dark);
            font-weight: 700;
        }

        /* ========== MODAL ========== */
        .orden-detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 260px;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
            backdrop-filter: blur(4px);
        }

        .orden-detail-modal.show {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 40px;
        }

        .orden-detail-content {
            background: var(--card-bg);
            border-radius: 18px;
            width: 100%;
            max-width: 750px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 18px 38px rgba(2, 54, 97, 0.16);
        }

        .orden-detail-header {
            padding: 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.22);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(90deg, var(--primary-blue-dark) 0%, var(--primary-blue) 100%);
        }

        .orden-detail-header h4 {
            color: #fff !important;
            font-size: 15px !important;
            font-weight: 800 !important;
            text-transform: uppercase !important;
            letter-spacing: 0.3px !important;
        }

        .orden-detail-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #fff;
            transition: all 0.2s ease;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orden-detail-close:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        .orden-detail-body {
            padding: 18px;
        }

        .orden-detail-section {
            margin-bottom: 18px;
        }

        .orden-detail-section-title {
            font-size: 13px;
            font-weight: 800;
            color: var(--primary-blue);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-soft);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .orden-detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .producto-item {
            padding: 12px;
            background: var(--bg-light);
            border-radius: 10px;
            border: 1px solid var(--border-soft);
            border-left: 4px solid var(--primary-blue);
            transition: all 0.2s ease;
        }

        .producto-item:hover {
            background: var(--primary-blue-light);
            box-shadow: 0 4px 12px rgba(0, 112, 168, 0.1);
        }

        .producto-codigo {
            font-weight: 800;
            color: var(--text-dark);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        .producto-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .producto-qty {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 600;
        }

        .scrollable::-webkit-scrollbar {
            width: 8px;
        }

        .scrollable::-webkit-scrollbar-track {
            background: transparent;
        }

        .scrollable::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .scrollable::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        @media (max-width: 1400px) {
            .detail-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .orden-item-details {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <img src="/static/img/relix-logo.png" alt="Relix" title="Relix Water">
            </div>
        </div>

        <div class="sidebar-search">
            <input type="text" id="searchInput" placeholder="Buscar requisición...">
        </div>

        <div class="sidebar-content scrollable" id="requisionesList">
            <!-- Requisiciones se cargan aquí -->
        </div>

        <div class="sidebar-footer">
            <div class="sidebar-footer-user">
                <span class="sidebar-footer-name">{{ session.nombre or 'Usuario' }}</span>
                <span class="sidebar-footer-role">{{ session.rol or '' }}</span>
            </div>
            <a href="/logout" class="logout-btn" title="Cerrar sesión">
                <i class="bi bi-box-arrow-right"></i>
            </a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <div class="topbar">
            <div class="topbar-title">
                <i class="bi bi-file-earmark-check me-2"></i>Supervisión de Requisiciones
            </div>
            <div class="topbar-actions">
                <a href="/" class="btn-icon">
                    <i class="bi bi-arrow-left me-1"></i>Atrás
                </a>
            </div>
        </div>

        <div class="detail-panel">
            <div id="detailContent">
                <div class="detail-empty">
                    <div>
                        <div class="detail-empty-icon">
                            <i class="bi bi-inbox"></i>
                        </div>
                        <div class="detail-empty-text">Selecciona una requisición</div>
                        <div class="detail-empty-subtext">Elige una requisición de la lista para ver sus detalles</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de detalle de orden -->
    <div class="orden-detail-modal" id="ordenModal">
        <div class="orden-detail-content">
            <div class="orden-detail-header">
                <h4 style="margin: 0; font-size: 16px; color: #202124;">Orden de Compra #<span id="modalOcNumber">-</span></h4>
                <button class="orden-detail-close" onclick="closeOdenModal()">&times;</button>
            </div>
            <div class="orden-detail-body" id="modalContent">
                <!-- Contenido se carga aquí -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Datos de requisiciones
        const requisiciones = JSON.parse({{ requisiciones_json | tojson }});
        let currentSelectedReq = null;

        // Renderizar lista de requisiciones
        function renderRequisiciones(filter = '') {
            const container = document.getElementById('requisionesList');
            container.innerHTML = '';

            const filtered = requisiciones.filter(req =>
                req.num_req.toString().includes(filter) ||
                filter === ''
            );

            if (filtered.length === 0) {
                container.innerHTML = '<div style="padding: 16px; text-align: center; color: #5f6368; font-size: 12px;">No hay requisiciones</div>';
                return;
            }

            filtered.forEach(req => {
                const item = document.createElement('div');
                item.className = 'req-item' + (currentSelectedReq === req.num_req ? ' active' : '');
                item.onclick = () => selectRequisicion(req.num_req);

                const statusClass = req.estado.toUpperCase().includes('APROBADO') ? 'approved' :
                                   req.estado.toUpperCase().includes('RECHAZADO') ? 'rejected' : 'pending';

                item.innerHTML = `
                    <span class="req-item-number">#${req.num_req}</span>
                    <span class="req-item-date">${new Date(req.fecha).toLocaleDateString('es-ES')}</span>
                    <span class="req-item-status ${statusClass}">${req.estado}</span>
                `;
                container.appendChild(item);
            });
        }

        // Seleccionar requisición
        function selectRequisicion(numReq) {
            currentSelectedReq = numReq;
            renderRequisiciones(document.getElementById('searchInput').value);

            const req = requisiciones.find(r => r.num_req === numReq);
            if (req) {
                renderDetail(req);
            }
        }

        // Renderizar detalle
        function renderDetail(req) {
            const statusClass = req.estado.toUpperCase().includes('APROBADO') ? 'approved' :
                               req.estado.toUpperCase().includes('RECHAZADO') ? 'rejected' : 'pending';

            let detailHTML = `
                <div class="detail-header">
                    <div class="detail-header-title">Requisición #${req.num_req}</div>
                    <div class="detail-grid">
                        <div class="detail-field">
                            <span class="detail-field-label">Solicitante</span>
                            <span class="detail-field-value">${req.solicitante}</span>
                        </div>
                        <div class="detail-field">
                            <span class="detail-field-label">Centro de Costo</span>
                            <span class="detail-field-value">${req.centro_costo}</span>
                        </div>
                        <div class="detail-field">
                            <span class="detail-field-label">Estado</span>
                            <span class="detail-field-value status ${statusClass}">${req.estado}</span>
                        </div>
                        <div class="detail-field">
                            <span class="detail-field-label">Fecha Emisión</span>
                            <span class="detail-field-value">${new Date(req.fecha_emision).toLocaleDateString('es-ES')}</span>
                        </div>
                        <div class="detail-field">
                            <span class="detail-field-label">Fecha Requerida</span>
                            <span class="detail-field-value">${new Date(req.fecha_requerida).toLocaleDateString('es-ES')}</span>
                        </div>
                        <div class="detail-field">
                            <span class="detail-field-label">OCs Asociadas</span>
                            <span class="detail-field-value">${req.ordenes.length} orden(es)</span>
                        </div>
                    </div>
                </div>

                <div class="ordenes-section">
                    <div class="ordenes-header">
                        <span class="ordenes-header-title">Órdenes de Compra</span>
                        <span class="ordenes-header-count">${req.ordenes.length}</span>
                    </div>
            `;

            req.ordenes.forEach(oc => {
                const statusBadgeClass = oc.tracking && oc.tracking[0] &&
                    oc.tracking[0].toUpperCase().includes('BODEGA') ? 'in-bodega' : '';

                detailHTML += `
                    <div class="orden-item" onclick="showOdenDetail('${oc.num_oc}', ${req.num_req})">
                        <div class="orden-item-header">
                            <span class="orden-item-number">OC #${oc.num_oc}</span>
                            <span class="orden-item-badge ${statusBadgeClass}">
                                ${oc.tracking ? oc.tracking[0].replace(/_/g, ' ') : 'SIN REGISTRAR'}
                            </span>
                        </div>
                        <div class="orden-item-details">
                            <div class="orden-item-detail">
                                <span class="orden-item-detail-label">Proveedor</span>
                                <span class="orden-item-detail-value">${oc.proveedor}</span>
                            </div>
                            <div class="orden-item-detail">
                                <span class="orden-item-detail-label">Monto</span>
                                <span class="orden-item-detail-value">$${(oc.monto || 0).toLocaleString('es-ES')}</span>
                            </div>
                            <div class="orden-item-detail">
                                <span class="orden-item-detail-label">Productos</span>
                                <span class="orden-item-detail-value">${oc.lineas.length} líneas</span>
                            </div>
                            <div class="orden-item-detail">
                                <span class="orden-item-detail-label">Fecha</span>
                                <span class="orden-item-detail-value">${new Date(oc.fecha).toLocaleDateString('es-ES')}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            detailHTML += '</div>';
            document.getElementById('detailContent').innerHTML = detailHTML;
        }

        // Mostrar detalle de orden
        function showOdenDetail(numOc, numReq) {
            const req = requisiciones.find(r => r.num_req === numReq);
            const oc = req.ordenes.find(o => o.num_oc === numOc);

            if (!oc) return;

            document.getElementById('modalOcNumber').textContent = numOc;

            let contentHTML = `
                <div class="orden-detail-section">
                    <div class="orden-detail-section-title">Información General</div>
                    <div class="orden-detail-grid">
                        <div class="detail-field">
                            <span class="detail-field-label">Proveedor</span>
                            <span class="detail-field-value">${oc.proveedor}</span>
                        </div>
                        <div class="detail-field">
                            <span class="detail-field-label">Fecha OC</span>
                            <span class="detail-field-value">${new Date(oc.fecha).toLocaleDateString('es-ES')}</span>
                        </div>
                        <div class="detail-field">
                            <span class="detail-field-label">Centro de Costo</span>
                            <span class="detail-field-value">${oc.centro_costo}</span>
                        </div>
                        <div class="detail-field">
                            <span class="detail-field-label">Monto Total</span>
                            <span class="detail-field-value">$${(oc.monto || 0).toLocaleString('es-ES')}</span>
                        </div>
                    </div>
                </div>
            `;

            if (oc.tracking) {
                contentHTML += `
                    <div class="orden-detail-section">
                        <div class="orden-detail-section-title">Estado en Bodega</div>
                        <div class="orden-detail-grid">
                            <div class="detail-field">
                                <span class="detail-field-label">Estado</span>
                                <span class="detail-field-value">${oc.tracking[0].replace(/_/g, ' ')}</span>
                            </div>
                            <div class="detail-field">
                                <span class="detail-field-label">Registrado por</span>
                                <span class="detail-field-value">${oc.tracking[3] || 'N/A'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }

            contentHTML += `
                <div class="orden-detail-section">
                    <div class="orden-detail-section-title">Productos (${oc.lineas.length})</div>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
            `;

            oc.lineas.forEach(linea => {
                contentHTML += `
                    <div class="producto-item">
                        <div class="producto-codigo">${linea[0] || 'N/A'}</div>
                        <div class="producto-desc">${linea[1] || 'Sin descripción'}</div>
                        <div class="producto-qty">Cantidad: ${(linea[2] || 0).toLocaleString('es-ES', {minimumFractionDigits: 2})}</div>
                    </div>
                `;
            });

            contentHTML += '</div></div>';
            document.getElementById('modalContent').innerHTML = contentHTML;
            document.getElementById('ordenModal').classList.add('show');
        }

        function closeOdenModal() {
            document.getElementById('ordenModal').classList.remove('show');
        }

        // Búsqueda
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderRequisiciones(e.target.value);
        });

        // Inicializar
        renderRequisiciones();
    </script>
</body>
</html>
