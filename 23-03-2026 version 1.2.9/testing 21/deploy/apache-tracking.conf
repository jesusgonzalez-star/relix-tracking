# Apache VirtualHost — Reverse Proxy a Gunicorn
# Copiar a /etc/apache2/sites-available/tracking.conf
# Habilitar: a2ensite tracking && a2enmod proxy proxy_http ssl headers && systemctl reload apache2

<VirtualHost *:80>
    ServerName tracking.ejemplo.cl
    # Redirigir todo HTTP a HTTPS
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName tracking.ejemplo.cl

    SSLEngine on
    SSLCertificateFile    /etc/ssl/certs/tracking.crt
    SSLCertificateKeyFile /etc/ssl/private/tracking.key
    # SSLCertificateChainFile /etc/ssl/certs/chain.pem

    # Headers de seguridad
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Archivos estaticos directo por Apache (sin pasar por Flask)
    Alias /static /opt/tracking-app/static
    <Directory /opt/tracking-app/static>
        Require all granted
        Options -Indexes
        ExpiresActive On
        ExpiresDefault "access plus 1 week"
    </Directory>

    # Reverse proxy a Gunicorn
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    ProxyPass /static !
    ProxyPass / http://127.0.0.1:5000/
    ProxyPassReverse / http://127.0.0.1:5000/
</VirtualHost>
