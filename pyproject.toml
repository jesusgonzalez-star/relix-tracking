[tool.pytest.ini_options]
testpaths = ["testing 21/tests"]
pythonpath = ["testing 21"]
norecursedirs = [".venv", "venv", "node_modules", "__pycache__", ".git"]
markers = [
    "integration: requiere RUN_INTEGRATION_TESTS=1, BD/SQL Server o Softland real",
]
addopts = [
    "--strict-markers",
    "--cov=routes",
    "--cov=services",
    "--cov=utils",
    "--cov=models",
    "--cov=schemas",
    "--cov=app",
    "--cov=config",
    "--cov=extensions",
    "--cov-report=term-missing:skip-covered",
    "--cov-fail-under=8",
]

[tool.coverage.run]
omit = [
    "*/tests/*",
    "*/.venv/*",
    "*/scripts/*",
]

[tool.coverage.report]
skip_empty = true
