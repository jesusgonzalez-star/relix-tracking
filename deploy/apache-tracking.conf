# Apache VirtualHost — Reverse Proxy a Gunicorn
# Copiar a: /etc/apache2/sites-available/tracking.conf
#
# Módulos requeridos:
#   a2enmod proxy proxy_http ssl headers rewrite expires deflate
#   a2ensite tracking
#   systemctl reload apache2

<VirtualHost *:80>
    ServerName tracking.ejemplo.cl

    # Permitir Let's Encrypt ACME challenge sin redirigir
    RewriteEngine On
    RewriteRule ^/.well-known/acme-challenge/ - [L]

    # Redirigir todo el resto a HTTPS
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName tracking.ejemplo.cl

    # === SSL/TLS ===
    SSLEngine on
    SSLCertificateFile      /etc/ssl/certs/tracking.crt
    SSLCertificateKeyFile   /etc/ssl/private/tracking.key
    # SSLCertificateChainFile /etc/ssl/certs/chain.pem

    # Protocolos seguros (TLS 1.2 y 1.3)
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    # === Headers de seguridad ===
    # Apache es la fuente única para headers HTTP genéricos. Flask solo añade
    # Content-Security-Policy (variable por endpoint) y Cache-Control (por MIME).
    # Si Flask también emite alguno de estos, Apache lo sobrescribe con "always set".
    Header always set X-Content-Type-Options    "nosniff"
    Header always set X-Frame-Options           "DENY"
    Header always set Referrer-Policy           "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set Permissions-Policy        "geolocation=(), microphone=(), camera=()"
    # X-XSS-Protection está deprecado (todos los navegadores modernos lo ignoran).

    # Ocultar versión de Apache en errores
    ServerTokens Prod
    ServerSignature Off

    # === Logs ===
    ErrorLog  /var/log/apache2/tracking-error.log
    CustomLog /var/log/apache2/tracking-access.log combined

    # === Compresión gzip ===
    AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json

    # === Archivos estáticos servidos por Apache (sin pasar por Gunicorn) ===
    Alias /static /opt/tracking-app/static
    <Directory /opt/tracking-app/static>
        Require all granted
        Options -Indexes
        ExpiresActive On
        ExpiresDefault "access plus 1 week"
        Header append Cache-Control "public"
    </Directory>

    # === Reverse proxy a Gunicorn ===
    ProxyPreserveHost On
    ProxyTimeout      120

    RequestHeader set X-Forwarded-Proto "https"
    # X-Forwarded-For lo gestiona mod_proxy automáticamente en 2.4+; no lo
    # sobrescribimos para conservar la IP real del cliente a través de la cadena.

    ProxyPass        /static !
    ProxyPass        / http://127.0.0.1:5000/ retry=1 timeout=120
    ProxyPassReverse / http://127.0.0.1:5000/

    # Página de error si Gunicorn no responde
    ErrorDocument 502 "La aplicación no está disponible. Intente más tarde."
    ErrorDocument 503 "La aplicación no está disponible. Intente más tarde."
</VirtualHost>
